name: CLA Assistant (Reusable)

on:
  workflow_call:
    inputs:
      app-id:
        description: "GitHub App ID for CLA bot"
        required: false
        type: string
        default: "2871141"
      allowlist:
        description: "Comma-separated list of GitHub usernames or bot patterns to skip CLA check"
        required: false
        type: string
        default: "dependabot[bot],renovate[bot],github-actions[bot]"
    secrets:
      CLA_APP_PRIVATE_KEY:
        required: true

permissions:
  actions: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.CLA_APP_PRIVATE_KEY }}
          owner: stella

      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PERSONAL_ACCESS_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/stella/cla/blob/main/CLA.md"
          branch: "cla-signatures"
          remote-organization-name: "stella"
          remote-repository-name: "cla"
          allowlist: ${{ inputs.allowlist }}
          custom-notsigned-prcomment: "Thank you for your pull request! Before we can merge it, we need you to sign the [Contributor License Agreement](https://github.com/stella/cla/blob/main/CLA.md).\n\nTo sign, please post the following comment on this PR (exactly as written):\n\n> I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA."
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
