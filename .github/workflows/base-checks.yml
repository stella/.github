name: Base Checks
# Quality gates: PR hygiene

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label (JSON format, e.g. "ubuntu-latest")'
        required: false
        type: string
        default: '"ubuntu-latest"'
      run-pr-lint:
        description: 'Run PR lint checks (conventional commits, labels, size)'
        required: false
        type: boolean
        default: true

jobs:
  pr-lint:
    if: inputs.run-pr-lint
    uses: stella/.github/.github/workflows/pr-lint.yml@main
    with:
      runs-on: ${{ inputs.runs-on }}
