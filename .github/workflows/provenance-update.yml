name: Provenance Update

on:
  workflow_call:
    inputs:
      root:
        description: "Repository root to scan"
        required: false
        type: string
        default: "."
      node-version:
        description: "Node.js version used to install cdxgen"
        required: false
        type: string
        default: "22"
      cdxgen-version:
        description: "Pinned @cyclonedx/cdxgen version"
        required: false
        type: string
        default: "12.1.5"
      install-syft:
        description: "Whether to install Syft for container provenance generation"
        required: false
        type: boolean
        default: false
      syft-version:
        description: "Pinned Syft release tag"
        required: false
        type: string
        default: "v1.42.4"
      provenance-version:
        description: "GitHub release tag in stella/provenance to install"
        required: false
        type: string
        default: "v0.1.0"
      provenance-repository:
        description: "Repository that hosts the provenance CLI"
        required: false
        type: string
        default: "stella/provenance"
      auth-token:
        description: "Optional token for create-pull-request when PR-triggered CI should run"
        required: false
        type: string
        default: ""
      install-command:
        description: "Optional repository install command to run before provenance generate"
        required: false
        type: string
        default: "bun install --frozen-lockfile"
      branch:
        description: "Branch name used for provenance refresh PRs"
        required: false
        type: string
        default: "chore/provenance-update"
      commit-message:
        description: "Commit message for generated provenance updates"
        required: false
        type: string
        default: "chore: refresh provenance artifacts"
      pr-title:
        description: "Pull request title for generated provenance updates"
        required: false
        type: string
        default: "chore: refresh provenance artifacts"
      pr-body:
        description: "Pull request body for generated provenance updates"
        required: false
        type: string
        default: "Automated provenance refresh generated by the shared nightly updater."

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install cdxgen
        shell: bash
        env:
          CDXGEN_VERSION: ${{ inputs.cdxgen-version }}
        run: |
          case "$CDXGEN_VERSION" in
            ''|*[!A-Za-z0-9._-]*)
              echo "::error::Invalid cdxgen-version input: $CDXGEN_VERSION"
              exit 1
              ;;
          esac
          npm install --global "@cyclonedx/cdxgen@$CDXGEN_VERSION"

      - id: syft
        if: inputs.install-syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: ${{ inputs.syft-version }}

      - name: Install provenance
        shell: bash
        env:
          PROVENANCE_REPOSITORY: ${{ inputs.provenance-repository }}
          PROVENANCE_VERSION: ${{ inputs.provenance-version }}
        run: |
          case "$PROVENANCE_REPOSITORY" in
            ''|*[!A-Za-z0-9._/-]*)
              echo "::error::Invalid provenance-repository input: $PROVENANCE_REPOSITORY"
              exit 1
              ;;
          esac
          case "$PROVENANCE_VERSION" in
            ''|*[!A-Za-z0-9._/-]*)
              echo "::error::Invalid provenance-version input: $PROVENANCE_VERSION"
              exit 1
              ;;
          esac
          case "${RUNNER_OS}:${RUNNER_ARCH}" in
            Linux:X64)
              target="x86_64-unknown-linux-gnu"
              asset_ext="tar.gz"
              binary_name="provenance"
              ;;
            macOS:ARM64)
              target="aarch64-apple-darwin"
              asset_ext="tar.gz"
              binary_name="provenance"
              ;;
            macOS:X64)
              target="x86_64-apple-darwin"
              asset_ext="tar.gz"
              binary_name="provenance"
              ;;
            Windows:X64)
              target="x86_64-pc-windows-msvc"
              asset_ext="zip"
              binary_name="provenance.exe"
              ;;
            *)
              echo "::error::Unsupported runner platform: ${RUNNER_OS}:${RUNNER_ARCH}"
              exit 1
              ;;
          esac

          asset_name="provenance-${PROVENANCE_VERSION}-${target}.${asset_ext}"
          checksums_name="provenance-${PROVENANCE_VERSION}-checksums.txt"
          release_base_url="https://github.com/${PROVENANCE_REPOSITORY}/releases/download/${PROVENANCE_VERSION}"
          asset_path="${RUNNER_TEMP}/${asset_name}"
          checksums_path="${RUNNER_TEMP}/${checksums_name}"
          install_root="${RUNNER_TEMP}/provenance-install"
          install_bin="${RUNNER_TEMP}/provenance-bin"

          curl --fail --silent --show-error --location \
            --output "$asset_path" \
            "${release_base_url}/${asset_name}"
          curl --fail --silent --show-error --location \
            --output "$checksums_path" \
            "${release_base_url}/${checksums_name}"

          expected_checksum="$(
            awk -v asset="$asset_name" '$2 == asset { print $1 }' "$checksums_path"
          )"
          if [ -z "$expected_checksum" ]; then
            echo "::error::Checksum for ${asset_name} not found in ${checksums_name}"
            exit 1
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            actual_checksum="$(sha256sum "$asset_path" | awk '{ print $1 }')"
          else
            actual_checksum="$(shasum -a 256 "$asset_path" | awk '{ print $1 }')"
          fi

          if [ "$actual_checksum" != "$expected_checksum" ]; then
            echo "::error::Checksum mismatch for ${asset_name}"
            exit 1
          fi

          rm -rf "$install_root" "$install_bin"
          mkdir -p "$install_root" "$install_bin"

          if [ "$asset_ext" = "zip" ]; then
            unzip -q "$asset_path" -d "$install_root"
          else
            tar -xzf "$asset_path" -C "$install_root"
          fi

          extracted_binary="$(find "$install_root" -type f -name "$binary_name" | head -n 1)"
          if [ -z "$extracted_binary" ]; then
            echo "::error::Failed to locate ${binary_name} in extracted release archive"
            exit 1
          fi

          cp "$extracted_binary" "$install_bin/$binary_name"
          chmod +x "$install_bin/$binary_name"
          echo "$install_bin" >> "$GITHUB_PATH"

      - name: Install repository dependencies
        if: inputs.install-command != ''
        shell: bash
        env:
          INSTALL_CMD: ${{ inputs.install-command }}
        working-directory: ${{ inputs.root }}
        run: $INSTALL_CMD

      - name: Resolve managed provenance paths
        id: paths
        shell: bash
        env:
          PROVENANCE_ROOT: ${{ inputs.root }}
        run: |
          root="${PROVENANCE_ROOT%/}"
          if [ -z "$root" ] || [ "$root" = "." ]; then
            add_paths='provenance/**'
          else
            add_paths="$root/provenance/**"
          fi
          {
            echo "add_paths<<EOF"
            echo "$add_paths"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate provenance artifacts
        shell: bash
        env:
          INSTALL_SYFT: ${{ inputs.install-syft }}
          PROVENANCE_ROOT: ${{ inputs.root }}
          PROVENANCE_SYFT: ${{ steps.syft.outputs.cmd }}
        run: |
          export PROVENANCE_CDXGEN="$(command -v cdxgen)"
          if [ "$INSTALL_SYFT" = "true" ]; then
            export PROVENANCE_SYFT
          else
            unset PROVENANCE_SYFT
          fi
          provenance generate --root "$PROVENANCE_ROOT"

      - name: Create refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ inputs.auth-token != '' && inputs.auth-token || github.token }}
          branch: ${{ inputs.branch }}
          delete-branch: true
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          body: ${{ inputs.pr-body }}
          add-paths: ${{ steps.paths.outputs.add_paths }}

      - name: Report updater result
        shell: bash
        env:
          OPERATION: ${{ steps.cpr.outputs.pull-request-operation }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          case "$OPERATION" in
            created|updated)
              echo "Opened or updated provenance PR: $PR_URL"
              ;;
            closed)
              echo "Closed stale provenance PR because there are no remaining changes."
              ;;
            *)
              echo "No provenance changes detected."
              ;;
          esac
