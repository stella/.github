name: PR Lint (Reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use (default: ubuntu-latest)'
        required: false
        type: string
        default: '"ubuntu-latest"'

jobs:
  pr-lint:
    # Skip if this is a body-only edit (no title change)
    if: github.event.action != 'edited' || github.event.changes.title
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: PR Conventional Commit Validation
        uses: ytanikin/PRConventionalCommits@b628c5a234cc32513014b7bfdd1e47b532124d98  # 1.3.0
        with:
          task_types: '["feat","fix","docs","refactor","chore","perf"]'
          custom_labels: '{"feat": "enhancement", "fix": "bug", "refactor": "enhancement"}'

      - name: copy-issue-labels
        uses: michalvankodev/copy-issue-labels@f54e957e58fc976eba5ffa36e1a1030572dbb78d  # 2023-09-12
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: size-label
        uses: pascalgn/size-label-action@f8edde36b3be04b4f65dcfead05dc8691b374348  # v0.5.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: auto-assign
        uses: kentaro-m/auto-assign-action@a6d59add3a817df08cafa9b166367768d2c337f8  # v2.0.1
        with:
          configuration-path: ".github/assign_config.yml"
