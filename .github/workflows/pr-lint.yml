name: PR Lint (Reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use (default: ubuntu-latest)'
        required: false
        type: string
        default: '"ubuntu-latest"'

jobs:
  pr-lint:
    # Skip if this is a body-only edit (no title change)
    if: github.event.action != 'edited' || github.event.changes.title
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: PR Conventional Commit Validation
        uses: ytanikin/PRConventionalCommits@b628c5a234cc32513014b7bfdd1e47b532124d98  # 1.3.0
        with:
          task_types: '["feat","fix","docs","refactor","chore","perf"]'
          custom_labels: '{"feat": "enhancement", "fix": "bug", "refactor": "enhancement"}'

      - name: copy-issue-labels
        uses: michalvankodev/copy-issue-labels@c4df96ee53d2cdf639ba169a26c43b04d5085cb3  # 2023-09-12
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: size-label
        uses: pascalgn/size-label-action@56b489b027932ec0cf60438a1a5f1a19c8fc71ff  # v0.5.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: auto-assign
        uses: kentaro-m/auto-assign-action@0a2c53d3721e4c5cfcce6afd4014aecc337979f6  # v2.0.2
        with:
          configuration-path: ".github/assign_config.yml"
